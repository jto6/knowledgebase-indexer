# Central knowledge-base catalog (cross-repo).
#
# The registry of which repos contribute to the catalog (D8). Card-only scope +
# the markdown renderer: generates per-domain slices into the central catalog
# home (~/dev/kb/index/<domain>.md) that consumers (council members, projects,
# ad-hoc sessions) subscribe to. Add more repo roots under `include` over time.
directories:
  include:
    - "/home/jon/dev/BSFL"
    - "/home/jon/dev/research/SDV-research"
  exclude:
    - "**/.git/**"
    - "**/__pycache__/**"

keywords:
  files: []

output:
  file: "/home/jon/dev/kb/index"   # markdown → an output directory of index files
  format: "markdown"
  # Optional per-view overrides (auto|on|off). The word index is opt-in (off by
  # default); prefer `kbi search <config> PATTERN` for ad-hoc lookups.
  # views:
  #   word: on      # include the (heavy) word index in the markdown catalog
  #   tag: off      # suppress the tag index

types:
  include: [card]
