# Sample kbi configuration file
directories:
  include:
    - "/home/jon/TIGoogleDrive/MyMaps"
  exclude:
    - "**/node_modules/**"
    - "**/.git/**"
    - "**/build/**"
    - "**/photos/**"
    - "**/__pycache__/**"
    - "**/.venv*/**"

keywords:
  files:
    - "/home/jon/TIGoogleDrive/MyMaps/.kw.mmtxt"

output:
  # file: "my_index.mm"     # optional: override derived default (<config-stem>.mm for
  #                          # freeplane, <config-stem>/ dir for markdown)
  format: "freeplane"       # freeplane (.mm) | markdown (per-domain index files)
  partition_by_domain: "auto" # auto (split by domain if any file has one) | on | off
  # Per-view emission. Each view is auto | on | off. `auto` is the renderer
  # default: every view is include-if-it-has-data, except `word`, which is opt-in
  # (off by default for both renderers — it is heavy; use `kbi search` instead).
  # Override here to force a view:
  views:
    # word: "on"            # opt in to the (heavy) word index
    # file_system: on
    # keyword: on
    # tag: off
    # dependencies: on
    # glossary: on

# Select which built-in types to index. Handlers are built in; you only
# include/exclude them by name (card | markdown | freeplane). Omit `types` to
# index all. A file is classified by its most-specific type (.kb.md = card).
types:
  exclude: [card]     # deep content index — everything except the card summaries
  # include: [card]   # (alternative) card-only catalog
