# Sample kbi configuration file
directories:
  include:
    - "/home/jon/MyGoogleDrive/MyMaps"
    - "/home/jon/TIGoogleDrive/MyMaps"
    - "/home/jon/dev/research/SDV-research"
  exclude:
    - "**/node_modules/**"
    - "**/.git/**"
    - "**/build/**"
    - "**/photos/**"
    - "**/__pycache__/**"
    - "**/.venv*/**"

keywords:
  files:
    - "/home/jon/TIGoogleDrive/MyMaps/.kw.mmtxt"
    - "/home/jon/MyGoogleDrive/MyMaps/.kw.mmtxt"

output:
  format: "freeplane"
  # This is a deep, general mind-map index of mixed trees; keep it flat even
  # though SDV-research carries a domain (its kb.yml) that would otherwise split it.
  partition_by_domain: "off"

types:
  exclude: [card]     # deep content index — exclude the .kb.md card summaries
