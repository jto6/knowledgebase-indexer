# Deep within-repo index over BSFL Fall 2025.
#
# Within-repo scope: index all built-in types so kbi deep-indexes the full content
# (raw plans, guides) AND parses cards card-aware. Output stays local to the repo.
# `types` is omitted below, which means "all built-in types".
directories:
  include:
    - "/home/jon/dev/BSFL/Fall 2025"
  exclude:
    - "**/.git/**"
    - "**/__pycache__/**"

keywords:
  files: []

output:
  file: "/tmp/bsfl_deep_index.mm"
  format: "freeplane"
  # The word index is opt-in (off by default); use `kbi search` for lookups.
  # views:
  #   word: "on"     # opt in to the (heavy) word index

# `types` omitted → index all built-in types (cards parsed card-aware)
